# Relay C-2 en docker local/LAN (fase sin despliegue; Railway queda a un
# `railway up` cuando haya créditos). Smoke test documentado en
# docs/audits/relay-lan-smoke.md.
#
#   docker compose up -d relay
#   curl -s http://localhost:8443/v1/health
#
# Para el iPhone físico en LAN, el daemon corre en el host con
# RUTSUBO_RELAY_URL=http://127.0.0.1:8443 y el teléfono apunta a
# ws://<ip-del-host>:8443 (TLS lo aporta el despliegue real; ver smoke doc).

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    container_name: rutsubo-relay
    ports:
      - "8443:8443"
    volumes:
      - relay-data:/data
    restart: unless-stopped

volumes:
  relay-data:
